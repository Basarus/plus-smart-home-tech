syntax = "proto3";

package telemetry.message.event;

import "google/protobuf/timestamp.proto";

option java_package = "ru.yandex.practicum.grpc.telemetry.message.event";
option java_multiple_files = true;

message HubEventProto {
  string hub_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof payload {
    DeviceAddedEventProto device_added = 3;
    DeviceRemovedEventProto device_removed = 4;
    ScenarioAddedEventProto scenario_added = 5;
    ScenarioRemovedEventProto scenario_removed = 6;
    DeviceActionRequest device_action_request = 7;
  }
}

message DeviceAddedEventProto {
  string id = 1;
  DeviceTypeProto type = 2;
}

message DeviceRemovedEventProto {
  string id = 1;
}

message ScenarioAddedEventProto {
  string name = 1;
  repeated ScenarioConditionProto conditions = 2;
  repeated ScenarioActionProto actions = 3;
}

message ScenarioRemovedEventProto {
  string name = 1;
}

message ScenarioConditionProto {
  string sensor_id = 1;
  ConditionProto condition = 2;
}

message ScenarioActionProto {
  string sensor_id = 1;
  DeviceActionProto action = 2;
}

message ConditionProto {
  ConditionTypeProto type = 1;
  ConditionOperationProto operation = 2;

  oneof value {
    int32 int_value = 3;
    bool bool_value = 4;
  }
}

message DeviceActionProto {
  ActionTypeProto type = 1;
  int32 value = 2;
}

message DeviceActionRequest {
  string hub_id = 1;
  string scenario_name = 2;
  DeviceActionProto action = 3;
  google.protobuf.Timestamp timestamp = 4;
}

enum DeviceTypeProto {
  MOTION_SENSOR = 0;
  TEMPERATURE_SENSOR = 1;
  LIGHT_SENSOR = 2;
  CLIMATE_SENSOR = 3;
  SWITCH_SENSOR = 4;
}

enum ConditionTypeProto {
  MOTION = 0;
  TEMPERATURE = 1;
  LUMINOSITY = 2;
  HUMIDITY = 3;
  SWITCH = 4;
}

enum ConditionOperationProto {
  EQUALS = 0;
  GREATER_THAN = 1;
  LOWER_THAN = 2;
}

enum ActionTypeProto {
  ACTIVATE = 0;
  DEACTIVATE = 1;
  INVERSE = 2;
  SET_VALUE = 3;
}